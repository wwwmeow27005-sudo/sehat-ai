<!DOCTYPE html>
<html lang="en">
<head>
    <title>SehatAI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Apps/style.css">
    <link rel="manifest" href="manifest.json">

</head>
<body>

<h1>SehatAI Health App</h1>
<div class="calculate">
<input id="weight" placeholder="Weight (kg)"><br>
<input id="feet" type="number" placeholder="height in Feet"><br>
<input id="inches" type="number" placeholder="height inInches"><br>
<button onclick="calculateBMI()">Calculate</button><button onclick="clearFields()">Clear</button>


<p id="result"></p></div>
<h3>History</h3>
<p id="history"></p>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>





<script src="/Apps/script.js"></script>
</body>
</html>
